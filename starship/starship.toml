"$schema" = 'https://starship.rs/config-schema.json'

# dotfiles-* :: starship prompt  (tokyonight-storm, low-glare revision)
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# WHAT CHANGED & WHY:
# The previous revision kept the gruvbox-era layout but swapped in tokyonight hex
# values вҖ” and tokyonight's orange/yellow/cyan are *foreground accents*, not fill
# colors. Using them as big segment BACKGROUNDS with light text gave you three
# glaring bright bands. This revision inverts that relationship:
#
#   вҖў Every segment now sits on one of two DARK surface shades (srf1/srf2) that
#     step subtly so the powerline arrows still read as a gentle ridge, not a
#     rainbow. The shapes/format are unchanged вҖ” only the color model flipped.
#   вҖў The bright tokyonight colors are now the TEXT/ICON color of each segment,
#     so each band is still identifiable at a glance but easy on the eyes:
#         os/user вҶ’ blue В· dir вҶ’ yellow В· git branch вҶ’ green В· git status вҶ’ orange
#         languages вҶ’ cyan В· docker/conda вҶ’ purple В· time вҶ’ muted
#
# KNOB: want a touch more pop on one band? Change just that module's text color
# (the `fg:` inside its `format`). To go even calmer, point a module at
# color_comment. Nothing else needs to move.
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# BAND STRUCTURE (why git rides the same surface as dir, and time the same as
# docker): a powerline band that can be EMPTY leaves its two arrows back-to-back
# with nothing between them вҖ” a stray notch that looks like a gap (this is what
# happened to the git band in a non-repo dir). The fix is to group modules so
# every colored band is anchored by an always-present module. The only modules
# that ALWAYS render are os/username, directory, and time вҖ” so there are exactly
# three gap-proof bands:
#   srf1 : os + username
#   srf2 : directory + git + languages          (anchored by directory)
#   srf1 : docker/k8s/aws/conda/вҖҰ + custom + cmd_duration + jobs + time  (by time)
# Only two interior arrows remain, both flanked by always-present content, so no
# empty-band gaps can appear. (We also dropped $fill: it claims the whole line
# width, which left zero room for zsh's RPROMPT and suppressed right_format.)

format = """
[оӮ¶](fg:color_srf1)\
$os\
$username\
[оӮ°](fg:color_srf1 bg:color_srf2)\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$ruby\
$lua\
[оӮ°](fg:color_srf2 bg:color_srf1)\
$docker_context\
$kubernetes\
$aws\
$conda\
$pixi\
$direnv\
$custom\
$jobs\
$time\
[оӮҙ](fg:color_srf1)\
$line_break$status$character$sudo"""

right_format = """
[оӮ¶](fg:color_srf1)\
$shell$cmd_duration$memory_usage
[оӮҙ](fg:color_srf1)\
"""

continuation_prompt = "[вҲҷ](fg:color_comment)"   # the > > on multi-line input

palette = 'tokyonight_storm'

[palettes.tokyonight_storm]
# в”Җв”Җ accents вҖ” now used as TEXT, not as fills в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
color_fg0     = '#c0caf5'   # fg (brightest text)
color_fg_dark = '#a9b1d6'   # softer text (quiet segments)
color_blue    = '#7aa2f7'
color_aqua    = '#7dcfff'   # cyan
color_green   = '#9ece6a'
color_orange  = '#ff9e64'
color_purple  = '#bb9af7'   # magenta
color_red     = '#f7768e'
color_yellow  = '#e0af68'
color_comment = '#565f89'   # muted / de-emphasized
# в”Җв”Җ surfaces вҖ” the two dark segment fills (subtle stepped depth) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
color_srf1    = '#24283b'   # storm bg, slightly raised above the terminal
color_srf2    = '#1f2335'   # bg_dark, a touch deeper

[os]
disabled = false
style = "bg:color_srf1 fg:color_aqua"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "пҢӘ"

[username]
show_always = true
style_user = "bg:color_srf1 fg:color_purple"
style_root = "bg:color_srf1 fg:color_red"   # root stands out (kept readable, not a fill)
format = '[ $user ]($style)'

[directory]
style = "fg:color_yellow bg:color_srf2"
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "../"
read_only = "у°Ңҫ "       # NEW vs your config: lock icon in read-only dirs
read_only_style = "fg:color_red bg:color_srf2"
repo_root_style = "bold fg:color_yellow bg:color_srf2"   # make the git-root segment pop
before_repo_root_style = "fg:color_comment bg:color_srf2"
# When repo_root_style is set, starship renders the path via repo_root_format
# (NOT `format` above) вҖ” and the built-in default ends with a literal unstyled
# trailing space, which showed up as a blank hole between directory and git on
# the powerline. Redefine it here without that trailing space, and pad the
# leading edge inside a bg:color_srf2 span so the bar stays continuous.
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "у°ҳ¬"
style = "fg:color_green bg:color_srf2"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:color_orange bg:color_srf2"
format = '([ $all_status $ahead_behind ]($style))'

# Added/deleted line counts (+12 -3) on the same srf1 git band, after status. Green/red
# text matching git's own diff colors. only_nonzero_diffs keeps it silent in a clean tree,
# so the segment only appears once you've actually changed something.
[git_metrics]
disabled = false
added_style = "fg:color_green bg:color_srf2"
deleted_style = "fg:color_red bg:color_srf2"
format = '([ +$added ]($added_style))([ -$deleted ]($deleted_style))'

# Short commit hash, shown ONLY in detached-HEAD state (only_detached = true) so
# a `git checkout <sha>`/`<tag>` no longer leaves the git band misleadingly blank.
# Green text to read as a sibling of the branch, on the same srf1 surface.
[git_commit]
only_detached = true
tag_disabled = false      # also surface an exact tag (e.g. v1.2.0) when on one
tag_symbol = " у°“№ "
style = "bg:color_srf2"
format = '[[ $hash$tag ](fg:color_green bg:color_srf1)]($style)'

# Mid-operation state (REBASING 2/8, MERGING, CHERRY-PICKINGвҖҰ). Red text so an
# in-progress rebase/merge is impossible to miss; sits in the same srf1 git band
# between branch and status, and only appears when an operation is underway.

[git_state]
style = "bg:color_srf2"
format = '[[ $state ($progress_current/$progress_total) ](fg:color_red bg:color_srf2)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[bun]
symbol = "оқҜ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[c]
symbol = "оҳһ "
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[cpp]
symbol = "оҳқ "
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[java]
symbol = "оү–"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:color_srf1"
format = '[[ $symbol($context) ](fg:color_purple bg:color_srf1)]($style)'

# в”Җв”Җ [custom]: the real power вҖ” any command becomes a segment в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Example: show the active VPN/tunnel interface (matches your tmux-netinfo idea).
[custom.vpn]
description = "active tunnel interface"
command = "ifconfig | awk '/^(utun|wg|tun)/{print $1; exit}' | tr -d ':'"
when = "ifconfig | grep -qE '^(utun|wg|tun)'"
symbol = "у°Ұқ "
style = "fg:color_purple bg:color_srf1"
format = '[ $symbol $output ]($style)'
# Other classic [custom] uses: gcloud project, terraform workspace, 1Password
# account, current Burp/engagement tag from an env var, etc.

# Kubernetes context (+ namespace) on the srf1 ops band, cyan text. GATED on real k8s
# project markers (Helm charts, kustomize, skaffold, a k8s/ dir, or an explicit
# KUBECONFIG export) вҖ” without detect_* config starship would render this in EVERY
# directory that has a current context, which is noise. context_aliases can shorten
# long ARNs/GKE names; add your clusters there as needed.
[kubernetes]
disabled = false
symbol = "уұғҫ "
style = "bg:color_srf1"
format = '[[ $symbol $context (\($namespace\)) ](fg:color_aqua bg:color_srf1)]($style)'
detect_files = ['Chart.yaml', 'skaffold.yaml', 'kustomization.yaml']
detect_folders = ['k8s', '.helm', 'manifests']
detect_env_vars = ['KUBECONFIG']
# [kubernetes.context_aliases]
# "arn:aws:eks:us-east-1:123456789:cluster/prod" = "prod"

[aws]
symbol = "у°ёҸ "
style = "fg:color_orange bg:color_srf1"
format = '[ $symbol ($profile) (\($region\)) ]($style)'
# disabled by default elsewhere; shows AWS_PROFILE/region when set

[env_var.ENGAGEMENT]            # show a custom env var when present (e.g. client tag)
variable = "ENGAGEMENT"
symbol = "рҹҺҜ "
style = "fg:color_red"
format = '[ $symbol $env_value ]($style)'

[conda]
style = "bg:color_srf1"
format = '[[ $symbol ($environment) ](fg:color_purple bg:color_srf1)]($style)'

[pixi]
style = "bg:color_srf1"
format = '[[ $symbol($version) ($environment) ](fg:color_purple bg:color_srf1)]($style)'

# direnv state on the srf1 band вҖ” you hook direnv in os/macos.zsh but had no visual
# feedback that an .envrc was loaded vs. waiting for `direnv allow`. Yellow when allowed
# & loaded, red when blocked/denied so an un-allowed .envrc is obvious. Only renders in a
# directory under direnv's control (an .envrc up the tree).
[direnv]
disabled = false
symbol = "о«ё "
style = "bg:color_srf1"
format = '[[ $symbol $loaded ](fg:color_yellow bg:color_srf1)]($style)'
loaded_msg = "on"
unloaded_msg = "off"
allowed_msg = "п’§ "
not_allowed_msg = "у°Қ· "
denied_msg = "оӘҮ "

# ruby + lua are declared in mise/config.toml as global runtimes, so they belong
# in the language band alongside the rest. Same cyan-on-srf2 treatment. (Section
# order here is irrelevant вҖ” the `format` string at the top controls layout.)
[ruby]
symbol = "оң№"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

[lua]
symbol = "о Ұ"
style = "bg:color_srf2"
format = '[[ $symbol($version) ](fg:color_aqua bg:color_srf2)]($style)'

# How long the last command took (only when it exceeds min_time). Lives in the
# RIGHT prompt (see right_format) вҖ” same srf1 surface as the rest of that pill,
# orange text so slow commands gently announce themselves. Transient: vanishes
# after a quick command. starship passes --cmd-duration to `prompt --right`, so
# it renders correctly on the right side.
[cmd_duration]
min_time = 500
style = "fg:color_orange bg:color_srf1"
format = '[ у°”ӣ $duration ]($style)'
# Background job count (`&`, Ctrl-Z). Purple text, srf1 surface; only shows when
# at least one job is running.
[jobs]
symbol = '+'
symbol_threshold = 1
number_threshold = 1
style = "bg:color_srf1"
format = '[[ $symbol $number ](fg:color_purple bg:color_srf1)]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:color_comment bg:color_srf1"
format = '[ $time ]($style)'

# в”Җв”Җ RIGHT prompt modules: shell В· cmd_duration В· memory_usage в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# (battery removed вҖ” it's already in the tmux status bar. cmd_duration is
# configured above, in its original spot; section order is irrelevant.)
[shell]
disabled = false
style = "fg:color_comment bg:color_srf1"
zsh_indicator = "zsh"
# Cross-shell: zsh is the daily driver, but dotfiles-Windows syncs THIS file verbatim
# (see its starship-sync.ps1) and runs starship under PowerShell вҖ” so label that shell
# too. Benign on zsh: starship only renders the indicator matching the active shell.
powershell_indicator = "_"
format = '[ $indicator ]($style)'

[memory_usage]
disabled = false
threshold = 50          # only show when RAM > 50%
symbol = "у°Қӣ "
style = "fg:color_purple bg:color_srf1"
format = '[ $symbol $ram_pct ]($style)'

[sudo]
disabled = false        # shows a marker while sudo creds are cached
symbol = "уұҗӢ "
style = "fg:color_yellow"
format = '[ $symbol ]($style)'

[line_break]
disabled = false

# Exit code of the last command, on the prompt line (no powerline surface вҖ” the
# ridge has already ended). success_symbol is empty, so this renders NOTHING on
# success and only speaks up on failure, complementing the red character arrow
# with the actual code/reason: 127 вҶ’ not found, 126 вҶ’ not executable, SIGINT on
# Ctrl-C, SIGKILL on an OOM, etc. pipestatus breaks down which stage of a
# `a | b | c` pipeline failed.
[status]
disabled = false
style = "fg:color_red"
symbol = "вңҳ "
not_executable_symbol = "рҹҡ« "
not_found_symbol = "рҹ”Қ "
sigint_symbol = "рҹ§ұ "
signal_symbol = "вҡЎ "
recognize_signal_code = true
map_symbol = true
pipestatus = true
pipestatus_separator = '[|](fg:color_comment)'
format = '[ $symbol $common_meaning $signal_name $maybe_int ]($style)'
pipestatus_format = '[ $pipestatus]($style)=>[ $symbol $common_meaning $signal_name $maybe_int]($style)'

[character]
disabled = false
success_symbol = '[вқ–](bold fg:color_green)'
error_symbol = '[вқ–](bold fg:color_red)'
vimcmd_symbol = '[оҳ« ](bold fg:color_green)'
vimcmd_replace_one_symbol = '[оҳ« ](bold fg:color_purple)'
vimcmd_replace_symbol = '[оҳ« ](bold fg:color_purple)'
vimcmd_visual_symbol = '[оҳ« ](bold fg:color_yellow)'
