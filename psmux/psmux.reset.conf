# psmux/psmux.reset.conf  → symlinked to ~/.config/psmux/psmux.reset.conf
# ──────────────────────────────────────────────────────────────────────────────
# THE KEYBINDING LAYER. Sourced FIRST by tmux.conf (before settings/theme/plugins).
# Splitting keys out of tmux.conf — an idea borrowed from omerxx's dotfiles — keeps
# the main file about *configuration* and this file about *muscle memory*. It also
# makes it trivial to wipe every default and start clean if you ever want to.
#
# NOTE: window MOVEMENT across nvim<->tmux (C-h/j/k/l) is owned by
# vim-tmux-navigator (plugin, set in tmux.conf) and is intentionally NOT here.
# These are the PREFIX-table bindings.
# ──────────────────────────────────────────────────────────────────────────────

# Uncomment to start from a completely blank slate (then everything below is your
# entire keymap). Left commented so tmux's sensible defaults remain as a fallback.
# unbind-key -a

# ── Prefix: C-a (screen-style; frees C-b) ─────────────────────────────────────
# Double-tap prefix (C-a C-a) → last-window, matching Core's tmux.reset.conf. This
# takes the C-a-in-the-prefix-table slot instead of the default send-prefix (a raw
# literal C-a) — the same trade Core makes: fast window toggling over sending a raw C-a.
set -g prefix C-a
unbind C-b
bind C-a last-window

# ── Reload ────────────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.config/psmux/psmux.conf \; display-message " psmux.conf reloaded"

# ── Panes: vim-style selection (Ctrl+h/j/k/l, NO prefix) ──────────────────────
# Root-table binds mirror the fleet's vim-tmux-navigator muscle memory. The host
# has no is_vim guard, so these are plain pane moves and do NOT pass through to
# nvim (and they shadow the shell's own C-l/C-h — that's the trade-off).
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# ── Panes: splits keep the current path ───────────────────────────────────────
# THESE WERE DEAD. From 2026-06 until 2026-07-21 all four routed through
# psmux-split.ps1 via `run-shell -b`, on the stated premise that "psmux expands
# #{pane_current_path}/#{pane_id} before the launcher runs". IT DOES NOT.
# `run-shell` performs no format expansion anywhere in psmux — verified:
# `grep -c expand_format src/server/connection.rs` returns 0. Only `-c` / `-d`
# start-dirs are expanded (src/server/mod.rs), which is why the `popup -d
# "#{pane_current_path}"` binds in psmux.conf always worked and these never did.
#
# So the helper was invoked with the LITERAL string `#{pane_id}`, its target
# lookup failed, and because `-b` runs fire-and-forget (`let _ = c.spawn()`) the
# failure produced no output, no status message, and no log line. The keys simply
# did nothing, silently, for six weeks. If you ever wire a bind through
# `run-shell -b` again, drop the `-b` first and watch it fail loudly.
#
# Back to the native verbs, whose -c IS expanded:
unbind '"'
unbind %
bind | split-window -h  -c "#{pane_current_path}"
bind - split-window -v  -c "#{pane_current_path}"
bind '\' split-window -fh -c "#{pane_current_path}"   # full-height vertical split
bind _ split-window -fv -c "#{pane_current_path}"     # full-width horizontal split
#
# CAVEAT — the bug psmux-split.ps1 was written to work around is real and is
# BACK until psmux is fixed: a start-dir the new native pwsh cannot chdir into
# (a \\wsl.localhost\... UNC path after `cdwsl`, or a since-deleted dir) kills
# the pane shell on entry and psmux tears the pane down — the "prefix + _ splits,
# opens, then immediately aborts" report. The fix belongs in psmux, not in a
# launcher script: `-c` should fall back to $HOME when the start-dir is UNC or
# missing, so EVERY caller gets it rather than just the ones routed through a
# helper. Tracked as B3. psmux/scripts/psmux-split.ps1 is kept in the tree until
# that lands and is verified, then it and its install.ps1 symlink entry go.

# ── Panes: resize ─────────────────────────────────────────────────────────────
# NOT repeatable (-r) on purpose: a repeatable prefix binding keeps psmux's
# prefix state "armed" until the next keypress, which leaves the prefix-active
# (orange) status pill stuck on after a resize. Plain binds clear it immediately.
# Trade-off: re-press the prefix for each resize step instead of holding the key.
# (If psmux-pain-control is loaded it may re-add repeatable resize binds; this
# only governs the binds defined here.)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ── Panes: management verbs (parity with Core's tmux.reset.conf) ──────────────
bind m resize-pane -Z                                 # (m)aximize / zoom toggle
bind x kill-pane                                      # no confirm prompt
bind X swap-pane -D                                   # rotate current pane down
bind P set pane-border-status                         # toggle per-pane titles
bind * setw synchronize-panes                         # type into all panes at once
# (F)loating window — Core uses tmux 3.7+ `new-pane`, which psmux doesn't have, so
# the native equivalent is a floating popup shell in the current path.
bind F popup -E -w 80% -h 80% -d "#{pane_current_path}"

# ── Windows: new window keeps the current path (like the splits above) ─────────
# Was routed through psmux-split.ps1 and was dead for the same reason — see the
# splits block above.
bind c new-window -c "#{pane_current_path}"
# Window cycling on Alt+Shift+H / Alt+Shift+L (Core also maps Shift-arrows, but on
# Windows Shift+Arrow is the shell's text-selection, so only the letter chords are
# bound here — Alt+arrow stays ceded to Windows Terminal, see the note below).
bind -n M-H previous-window
bind -n M-L next-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind & kill-window

# ── Pane navigation: Ctrl+h/j/k/l only (see C-hjkl binds above) ───────────────
# No Alt+arrow binds on purpose: Windows Terminal binds alt+<arrow> to its own
# MoveFocus (windows-terminal/settings.json), so it intercepts those before psmux
# ever sees them — any `bind -n M-<arrow>` here would be dead. C-h/j/k/l is the
# fleet muscle-memory anyway and crosses the nvim<->psmux boundary cleanly.

# ── Copy-mode (vi). Yank pipes through clip.exe (host equivalent of Core's clip). ─
bind Enter copy-mode
bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi C-v    send-keys -X rectangle-toggle
bind -T copy-mode-vi y      send-keys -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Quality of life (parity with Core's tmux.reset.conf) ──────────────────────
bind R refresh-client
bind S choose-session
bind d detach
