# ============================================================================
#  ~/.tmux.conf  -  psmux (native Windows tmux) config for dotfiles-Windows
#
#  STANDALONE, Windows-tailored. Mirrors dotfiles-core's keybinds and the
#  tokyonight-storm status palette for muscle-memory parity with the Unix fleet,
#  but is NOT Core's tmux tree. psmux can't run Core's bash status scripts, TPM,
#  vim-tmux-navigator's is_vim detection, or the `clip` helper, so those are
#  replaced with Windows-native equivalents:
#     - status segments  -> pwsh scripts in ~/.tmux/scripts (symlinked by install.ps1)
#     - copy             -> clip.exe (native equivalent of Core's `clip`)
#     - plugins / TPM    -> dropped (not runnable on the host)
#
#  Lines marked [verify] are where I matched the canonical reset layout; diff
#  them against your Core tmux.reset.conf if you've customized those binds.
#
#  #() segments shell out via pwsh 7 (psmux default-shell), so `~` expands. If
#  you set `default-shell cmd.exe`, swap the `~` in the two #() paths below for
#  an absolute %USERPROFILE% path (cmd doesn't expand `~`).
# ============================================================================

# ---- prefix: C-a (matches Core) --------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind C-a last-window                 # double-tap prefix -> last window

# ---- general ---------------------------------------------------------------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on              # OSC52 (Windows Terminal honors it)
set -sg escape-time 10
set -g history-limit 100000
set -g focus-events on
set -g default-terminal "tmux-256color"   # fallback to "screen-256color" if psmux lacks the terminfo
set -ga terminal-overrides ",*256col*:Tc" # truecolor passthrough

# reload (psmux reads the single ~/.tmux.conf, not Core's ~/.config/tmux tree)
unbind r
bind r source-file ~/.tmux.conf \; display "reloaded ~/.tmux.conf"

# ---- splits: | and -, inherit cwd ------------------------------------------
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---- pane select: prefix h/j/k/l -------------------------------------------
# Core navigates panes with vim-tmux-navigator (seamless C-hjkl into nvim splits)
# gated by an is_vim process check. That check can't run under psmux on the host,
# so we use plain prefixed select-pane instead. [verify] if your Core nav differs.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- pane resize: prefix H/J/K/L (repeatable) ------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r m resize-pane -Z             # zoom toggle
bind x kill-pane
bind X kill-window
bind * set-window-option synchronize-panes   # toggle pane sync
bind -r , previous-window
bind -r . next-window

# ---- copy-mode (vi) --------------------------------------------------------
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
# y -> Windows clipboard via clip.exe (the host equivalent of Core's `clip`)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi Escape send -X cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ============================================================================
#  tokyonight-storm status line (hand-rolled; matches the fleet palette)
#  Colors/caps as @user-options (same convention as Core's @tn_* / @cap_*).
# ============================================================================
set -g @tn_bg      "#24283b"
set -g @tn_fg      "#c0caf5"
set -g @tn_blue    "#7aa2f7"
set -g @tn_cyan    "#7dcfff"
set -g @tn_green   "#9ece6a"
set -g @tn_magenta "#bb9af7"
set -g @tn_comment "#565f89"
# Rounded pill caps — raw Nerd-Font glyphs (codepoints noted so you can restore
# them if a transfer ever mangles the bytes). [verify] vs your Core @cap_l/@cap_r.
# If they render as tofu, set both to "" for plain block pills.
set -g @cap_l ""   # e0b6 left rounded cap
set -g @cap_r ""   # e0b4 right rounded cap

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#{@tn_fg}"

# left: session pill (cyan)
set -g status-left-length 40
set -g status-left "#[fg=#{@tn_cyan}]#{@cap_l}#[fg=#{@tn_bg},bg=#{@tn_cyan},bold] #S #[fg=#{@tn_cyan},bg=default]#{@cap_r} "

# windows: inactive dim, active blue pill
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#{@tn_comment}] #I:#W "
setw -g window-status-current-format "#[fg=#{@tn_blue}]#{@cap_l}#[fg=#{@tn_bg},bg=#{@tn_blue},bold] #I:#W #[fg=#{@tn_blue},bg=default]#{@cap_r}"

# right: netinfo pill (pwsh) + cwd (magenta) + clock (blue) + battery pill (pwsh)
set -g status-right-length 150
set -g status-right "#(pwsh -NoProfile -File ~/.tmux/scripts/tmux-netinfo.ps1) #[fg=#{@tn_magenta}]#{@cap_l}#[fg=#{@tn_bg},bg=#{@tn_magenta},bold] #{b:pane_current_path} #[fg=#{@tn_magenta},bg=default]#{@cap_r} #[fg=#{@tn_blue}]#{@cap_l}#[fg=#{@tn_bg},bg=#{@tn_blue},bold] %H:%M #[fg=#{@tn_blue},bg=default]#{@cap_r} #(pwsh -NoProfile -File ~/.tmux/scripts/tmux-battery.ps1)"

# ---- borders / messages / mode ---------------------------------------------
set -g pane-border-style        "fg=#{@tn_comment}"
set -g pane-active-border-style "fg=#{@tn_blue}"
set -g message-style            "bg=#{@tn_bg},fg=#{@tn_fg}"
set -g mode-style               "bg=#{@tn_blue},fg=#{@tn_bg}"
