# ~/.tmux.conf  — psmux (native Windows tmux) host config
# ──────────────────────────────────────────────────────────────────────────────
# psmux reads this file directly (it speaks the tmux config language). It is
# symlinked to %USERPROFILE%\.tmux.conf by install.ps1.
#
# Deliberately limited to PORTABLE tmux options so this same file can later be
# shared with / vendored from Core (the fleet's canonical tmux config) the way
# the nvim tree is. Anything Unix-shell-specific (TPM bootstrap, the
# vim-tmux-navigator is_vim detection script, `clip`/xclip copy commands) is
# intentionally NOT here — it wouldn't run against a native Windows multiplexer.
# Theme hexes are tokyonight-storm, matching starship.toml, the Windows Terminal
# "Tokyo Night" scheme, and the nvim tokyonight theme.
# ──────────────────────────────────────────────────────────────────────────────

# --- prefix -------------------------------------------------------------------
# tmux's default prefix is C-b. If Core remaps it (a common choice is C-a),
# mirror that here so the binding is identical across the whole fleet. Left at
# the default for now — uncomment and set to match Core when you vendor it.
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# --- general ------------------------------------------------------------------
set -g mouse on                 # click panes/windows, drag borders, scroll
set -g base-index 1             # number windows from 1
setw -g pane-base-index 1       # ...and panes
set -g renumber-windows on      # keep window numbers gapless after a close
set -g history-limit 50000
set -g escape-time 10           # no ESC lag dropping into nvim normal mode
set -g focus-events on          # let nvim autoread / gitsigns react to focus
set -g set-clipboard on         # OSC52: copy-mode yanks reach the Windows clipboard

# --- truecolor (match Windows Terminal + tokyonight everywhere) ---------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- vi copy-mode (parity with nvim muscle memory) ----------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- splits / windows open in the current pane's directory --------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# --- reload -------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "reloaded ~/.tmux.conf"

# ──────────────────────────────────────────────────────────────────────────────
# Status bar — tokyonight-storm
# ──────────────────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1f2335,fg=#a9b1d6"

set -g status-left "#[bg=#7aa2f7,fg=#1f2335,bold] #S #[bg=#1f2335,fg=#7aa2f7]"
set -g status-left-length 30

set -g window-status-format         "  #I:#W  "
set -g window-status-current-format "#[bg=#24283b,fg=#7dcfff,bold]  #I:#W  "

set -g status-right "#[fg=#565f89]%a %d %b #[fg=#7dcfff]%R "
set -g status-right-length 40

set -g pane-border-style        "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style            "bg=#24283b,fg=#c0caf5"

