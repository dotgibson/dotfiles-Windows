# ============================================================================
#  ~/.config/psmux/psmux.conf - psmux (native Windows tmux) config
#
#  STANDALONE, Windows-tailored. Mirrors dotfiles-core's keybinds and the
#  tokyonight-storm status palette for muscle-memory parity with the Unix fleet,
#  but is NOT Core's tmux tree. psmux can't run Core's bash status scripts, TPM,
#  vim-tmux-navigator's is_vim detection, or the `clip` helper, so those are
#  replaced with Windows-native equivalents:
#     - popup helpers    -> pwsh scripts in ~/.config/psmux/scripts (symlinked by install.ps1)
#     - copy             -> clip.exe (native equivalent of Core's `clip`)
#     - plugins / TPM    -> psmux's own plugin manager (ppm) + @plugin declarations
#     - theme            -> hand-rolled status bar below (no tokyo-night-tmux)
#
#  Lines marked [verify] are where I matched the canonical reset layout; diff
#  them against your Core tmux.reset.conf if you've customized those binds.
#
#  The status bar is pure format vars (#{...}) — there are no #() shell-outs. The
#  `~` in the popup binds and the `run` line below is expanded by the default
#  shell (pwsh 7); if you switch default-shell to cmd.exe, replace those `~` with
#  an absolute %USERPROFILE% path (cmd doesn't expand `~`).
# ============================================================================
# ── 1. Keybinding layer (omerxx-style split) ─────────────────────────────────
source-file ~/.config/psmux/psmux.reset.conf

# =========================================================
# Colours & Terminal
# =========================================================
# psmux renders 24-bit colour natively (the #RRGGBB values below work as-is). It
# treats tmux's `terminal-overrides` as a no-op and ignores `terminal-features`
# entirely, so those lines were dropped — nothing to set here on the host.

# =========================================================
# Options
# =========================================================
set -g mouse-selection off
set-window-option -g pane-base-index 1
set -g  detach-on-destroy off        # closing a session jumps to another, not exit
set -g  set-clipboard on             # let apps set the system clipboard (OSC 52)
set-option -g set-titles on
set-option -g set-titles-string "#{session_name} · #{pane_current_command}"
set -g allow-predictions on
set -g prediction-dimming off
set -g scroll-enter-copy-mode off
set -g paste-detection off
set -g mode-keys vi                   # vi keys in copy-mode (matches the copy-mode-vi binds in reset.conf)

# =========================================================
# tokyonight-storm palette (kept in sync with starship.toml + Core's tmux theme)
# =========================================================
set -g @tn_bg      "#24283b"
set -g @tn_bg_dark "#1f2335"
set -g @tn_bg_hl   "#292e42"
set -g @tn_fg      "#c0caf5"
set -g @tn_fg_dim  "#a9b1d6"
set -g @tn_blue    "#7aa2f7"
set -g @tn_cyan    "#7dcfff"
set -g @tn_green   "#9ece6a"
set -g @tn_magenta "#bb9af7"
set -g @tn_red     "#f7768e"
set -g @tn_yellow  "#e0af68"
set -g @tn_orange  "#ff9e64"
set -g @tn_comment "#565f89"
set -g @tn_black   "#414868"

# rounded pill caps (Nerd Font) — segments "float" on the transparent bar
set -g @cap_l ""
set -g @cap_r ""

# NOTE: psmux only runs format expansion (#{...}, including #{@tn_*} user
# options) on status-left / status-right / window-status-format. The *style*
# OPTIONS below (status-style, pane-*-border-style, message-style, mode-style,
# window-status-separator) are handed to the colour parser verbatim, so a
# #{@tn_*} reference there parses as an invalid colour and silently falls back
# to the client default (bright green). Those options therefore use the literal
# hex values from the palette above — keep them in sync with the @tn_* block.

# =========================================================
# Pane borders (active = magenta, like nvim's accent; bg = bar highlight)
# =========================================================
set -g pane-border-style        "fg=#414868,bg=#292e42"
set -g pane-active-border-style "fg=#bb9af7,bg=#292e42"
set -g pane-border-status on

# =========================================================
# Status bar — base bg = @tn_bg_hl (#292e42); everything else is floating pills
# =========================================================
set -g status on
set -g status-interval 60
set -g status-position top
set -g status-justify left
# Base bar = the tokyonight highlight bg (@tn_bg_hl = #292e42). Pills float on
# it. Literal hex, NOT #{@tn_bg_hl} — see the NOTE above (a #{...} ref here
# silently falls back to bright green).
set -g status-style "bg=#292e42,fg=#c0caf5"


# ── LEFT: session pill. Colour + glyph track state: ──────────────────────────
#      normal → blue · prefix active → orange · copy/search mode → yellow
set -g status-left-length 50
set -g status-left "#[fg=#{?client_prefix,#{@tn_orange},#{?pane_in_mode,#{@tn_yellow},#{@tn_blue}}},bg=#{@tn_bg_hl}] #{@cap_l}#[fg=#{@tn_bg_hl},bg=#{?client_prefix,#{@tn_orange},#{?pane_in_mode,#{@tn_yellow},#{@tn_blue}}},bold]#{?client_prefix,󰠠 ,#{?pane_in_mode,󰆏,}}#S#[fg=#{?client_prefix,#{@tn_orange},#{?pane_in_mode,#{@tn_yellow},#{@tn_blue}}},bg=#{@tn_bg_hl}]#{@cap_r} "

# ── WINDOWS: inactive = muted pill · current = blue pill (+ zoom glyph) ───────
set -g window-status-separatpr "#[bg=#292e42]"
set -g window-status-format "#[fg=#{@tn_bg},bg=#{@tn_bg_hl}] #{@cap_l}#[fg=#{@tn_comment},bg=#{@tn_bg}]#I: #W#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_r} "
set -g window-status-current-format "#[fg=#{@tn_blue},bg=#{@tn_bg_hl}] #{@cap_l}#[fg=#{@tn_bg_hl},bg=#{@tn_blue},bold]#I: #W#{?window_zoomed_flag, 󰊓,}#[fg=#{@tn_blue},bg=#{@tn_bg_hl}]#{@cap_r} "

# ── RIGHT: cwd basename · clock ──────────
set -g status-right-length 50
set -g status-right "#[fg=#{@tn_green},bg=#{@tn_bg_hl}] #{@cap_l}#[fg=#{@tn_bg_hl},bg=#{@tn_green},bold]󰉋 #{b:pane_current_path}#[fg=#{@tn_green},bg=#{@tn_bg_hl}]#{@cap_r} #[fg=#{@tn_magenta},bg=#{@tn_bg_hl}] #{@cap_l}#[fg=#{@tn_bg_hl},bg=#{@tn_magenta},bold]󰥔 %H:%M#[fg=#{@tn_magenta},bg=#{@tn_bg_hl}]#{@cap_r} "

# message / command-prompt styling (literal hex — style options, see NOTE above)
set -g message-style "fg=#c0caf5,bg=#24283b,bold"
set -g mode-style    "fg=#c0caf5,bg=#24283b"

# =========================================================
# Plugins
# =========================================================
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-sensible'
set -g @plugin 'psmux-plugins/psmux-pain-control'

# tokyo-night-tmux removed — the bar above is hand-rolled.

# ── resurrect + continuum: intentionally NOT loaded ───────────────────────────
# These were the source of the recurring "saved environment" banner and the
# slow attach (continuum restores + replays captured pane contents on every
# launch). Note: setting @continuum-restore 'off' does NOT stop the autosave —
# once the @plugin is declared, continuum installs a status-bar autosave hook
# that keeps firing regardless. The only reliable way to silence it is to not
# load the plugins at all, so the @plugin lines are removed here.
#
# To re-enable session persistence later, add these back:
#   set -g @plugin 'psmux-plugins/psmux-resurrect'
#   set -g @plugin 'psmux-plugins/psmux-continuum'
#   set -g @resurrect-capture-pane-contents 'off'   # keep 'off' for fast attach
#   set -g @continuum-restore 'on'
#   set -g @continuum-save-interval '60'            # minutes; 0 disables autosave
#   set -g @continuum-verbose 'off'
# then press prefix + I to fetch them. Manual save/restore is always available
# via prefix + Ctrl-s / prefix + Ctrl-r once resurrect is installed.

# =========================================================
# Pop-ups  (scripts live in psmux\scripts\*.ps1 → ~/.config/psmux/scripts)
# =========================================================
bind g popup -E -w 85% -h 85% -d "#{pane_current_path}" lazygit
bind w display-popup -E -w 40% -h 50% "pwsh -NoProfile -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-menu.ps1"
bind T display-popup -E -w 80% -h 80% "pwsh -NoProfile -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-scratch.ps1"
bind f display-popup -E -w 55% -h 65% "pwsh -NoProfile -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-sesh.ps1"
bind D display-popup -w 78% -h 80% "pwsh -NoProfile -NoExit -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-cheat.ps1"

# =========================================================
# PPM bootstrap (auto-clone PPM on first run)
# =========================================================
# ppm is bootstrapped by install.ps1 into ~/.psmux/plugins/ppm (psmux's documented
# plugin path). ppm installs the declared @plugins there, and resurrect/continuum
# write their saves under ~/.psmux/ — the same tree psmux uses for its own runtime
# (session port/key files, warm session). After a fresh install, press prefix + I
# once to fetch the declared @plugins.
run '~/.psmux/plugins/ppm/ppm.ps1'
