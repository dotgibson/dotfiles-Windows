# ============================================================================
#  ~/.config/psmux/psmux.conf - psmux (native Windows tmux) config
#
#  STANDALONE, Windows-tailored. Mirrors dotfiles-core's keybinds and the
#  tokyonight-storm status palette for muscle-memory parity with the Unix fleet,
#  but is NOT Core's tmux tree. psmux can't run Core's bash status scripts, TPM,
#  vim-tmux-navigator's is_vim detection, or the `clip` helper, so those are
#  replaced with Windows-native equivalents:
#     - popup helpers    -> pwsh scripts in ~/.config/psmux/scripts (symlinked by install.ps1)
#     - copy             -> clip.exe (native equivalent of Core's `clip`)
#     - plugins / TPM    -> psmux's own plugin manager (ppm) + @plugin declarations
#     - theme            -> hand-rolled status bar below (no tokyo-night-tmux)
#
#  Lines marked [verify] are where I matched the canonical reset layout; diff
#  them against your Core tmux.reset.conf if you've customized those binds.
#
#  The status bar no longer spawns pwsh anywhere. This is deliberate and important:
#  psmux expands status-left / status-right *synchronously on the server's
#  state-push path* (src/format.rs run_shell_command -> Command::output() blocks
#  until the child exits), so every #() that spawned a cold `pwsh -NoProfile`
#  (netinfo/netspeed/cpu) stalled the FIRST paint — and re-stalled on every
#  status-interval cache-expiry. That was the "open a terminal, get a blank screen
#  with a blinking cursor" bug: psmux auto-launches from the profile
#  (powershell/os/30-windows.ps1), then couldn't draw until three cold pwsh
#  processes finished their WMI/Get-Net* queries.
#
#  The fix: netspeed/CPU are gone; cwd + clock are pure in-process #{...} vars; and
#  the operator/VPN pill is now file-backed — a Scheduled Task writes it out of
#  band and the bar just reads the file with a cheap `type` (cmd builtin, ~10ms,
#  NOT pwsh). So the bar's only shell-out is that ~10ms read, cached for
#  status-interval. See the OPT-IN block by status-right and os/33-psmux-pill.ps1.
#
#  The `~` in the popup binds and the `run` line below are expanded because those
#  run under the default shell (pwsh 7); if you switch default-shell to cmd.exe,
#  replace those `~` with %USERPROFILE%.
#
# ============================================================================
# ── 1. Keybinding layer (omerxx-style split) ─────────────────────────────────
source-file ~/.config/psmux/psmux.reset.conf

# =========================================================
# Colours & Terminal
# =========================================================
# psmux renders 24-bit colour natively (the #RRGGBB values below work as-is). It
# treats tmux's `terminal-overrides` as a no-op and ignores `terminal-features`
# entirely, so those lines were dropped — nothing to set here on the host.

# =========================================================
# Options
# =========================================================
# Mouse: ON, but tuned so in-pane TUIs own their own mouse. Three options work
# together — the combination matters:
#   mouse on .................. master switch; lets psmux see clicks/scroll/drag.
#   mouse-selection off ....... psmux does NOT draw its own drag-selection over
#                               the pane, and forwards mouse reports straight to
#                               apps that request tracking (DECSET
#                               1000/1002/1003/1006) — nvim, lazygit, htop then
#                               get their own clicks.
#   pwsh-mouse-selection off .. its documented default. Off means psmux does NOT
#                               grab the click for its own tmux-style copy-on-
#                               release selection; on would layer that on top of
#                               the in-pane app. Keep it off so nvim/lazygit get
#                               unmediated clicks.
# HISTORY: an earlier version of this comment blamed `pwsh-mouse-selection on`
# for nvim popping which-key (the "+Visual" menu) on a click, via a supposed X10
# re-encoding of the click into <Space>/<leader>. That was WRONG: nvim receives
# clean mouse events here, and the real cause was nvim itself turning a click
# (whose press and release land on different rows) into a Visual selection —
# fixed in nvim's options.lua by Nop'ing <LeftDrag>/<LeftRelease>, not here.
# Returning pwsh-mouse-selection to its default is still correct hygiene, just
# unrelated to that bug.
set -g base-index 1
set -g pane-base-index 1
set -sg escape-time 10
set -g history-limit 100000
set -g mouse on
set -g mouse-selection off
set -g scroll-enter-copy-mode off
set -g pwsh-mouse-selection off
set -g paste-detection off
set -g focus-events on
set -g mode-keys vi
set -g renumber-windows on
# destroy-unattached OFF (flipped 2026-07-01, paired with `warm on` below): `on` made a
# detached session die immediately, which also SUPPRESSES psmux's hidden `__warm__`
# standby server (see upstream psmux docs/warm-sessions.md at
# https://github.com/psmux/psmux — NOT a file in this repo) — so instant new-session
# never kicked in. Off
# lets `__warm__` spawn, so `new-session` (incl. the Ctrl+G per-project sessionizer and
# the `-A -s main` auto-attach) claims a pre-warmed server instead of cold-starting.
# TRADE-OFF: detached sessions now PERSIST (survive closing the terminal) and can pile
# up until killed — `psmux kill-session -t <name>` / `psmux ls` to manage. Revert this
# pair (back to `on` + `warm off`) if the persistence/pileup isn't worth the speedup.
set -g destroy-unattached off
set -g allow-passthrough on
set -g allow-predictions on
# warm ON: pre-spawn pane shells into a background pool so a new split/window attaches
# to an already-loaded shell instead of paying a cold pwsh + full-$PROFILE start on the
# spot. The profile's cold cost is dominated by per-runspace JIT that a fresh pane can't
# avoid (starship ~350ms + atuin ~210ms of first-run compilation — see the shell-perf
# notes), so warming moves that cost OFF the split keypress. Was `off` (undocumented, from
# a generic cleanup commit); flipped 2026-07-01 to test whether pooled shells hide the JIT.
# NOTE: the pool fills at SERVER start, so the full effect lands on the next fresh psmux
# launch, not a live source-file reload.
set -g warm on
set -g set-clipboard on             # let apps set the system clipboard (OSC 52)
set-option -g set-titles on
set-option -g set-titles-string "#{session_name} · #{pane_current_command}"

# =========================================================
# tokyonight-storm palette (kept in sync with starship.toml + Core's tmux theme)
# =========================================================
set -g @tn_bg      "#24283b"
set -g @tn_bg_dark "#1f2335"
set -g @tn_bg_hl   "#292e42"
set -g @tn_fg      "#c0caf5"
set -g @tn_fg_dim  "#a9b1d6"
set -g @tn_blue    "#7aa2f7"
set -g @tn_cyan    "#7dcfff"
set -g @tn_green   "#9ece6a"
set -g @tn_magenta "#bb9af7"
set -g @tn_red     "#f7768e"
set -g @tn_yellow  "#e0af68"
set -g @tn_orange  "#ff9e64"
set -g @tn_comment "#565f89"
set -g @tn_black   "#414868"

# rounded pill caps (Nerd Font) — segments "float" on the transparent bar
set -g @cap_l ""
set -g @cap_r ""

# ── PILL COLOUR MODEL: dark surface + coloured TEXT (low-glare) ───────────────
# Mirrors the decision documented in starship.toml: tokyonight's blue/green/
# yellow/magenta are *foreground accents*, not fills. The old bar used them as
# bright pill BACKGROUNDS with dark bold text — the same "glaring bright bands"
# the starship rewrite called out. Inverted here: every pill body is the dark
# surface @tn_bg (#24283b), floating on the slightly-lighter bar @tn_bg_hl
# (#292e42), with the accent colour as the TEXT/glyph. Same shapes, far calmer.
# The caps are drawn in @tn_bg so the rounded body reads as one quiet raised tile.
# To re-pop a single pill, change just that segment's text fg.

# NOTE: psmux only runs format expansion (#{...}, including #{@tn_*} user
# options) on status-left / status-right / window-status-format. The *style*
# OPTIONS below (status-style, pane-*-border-style, message-style, mode-style,
# window-status-separator) are handed to the colour parser verbatim, so a
# #{@tn_*} reference there parses as an invalid colour and silently falls back
# to the client default (bright green). Those options therefore use the literal
# hex values from the palette above — keep them in sync with the @tn_* block.

# =========================================================
# Pane borders (active = magenta, like nvim's accent; bg = bar highlight)
# =========================================================
set -g pane-border-style        "fg=#414868,bg=#292e42"
set -g pane-active-border-style "fg=#bb9af7,bg=#292e42"
set -g pane-border-status off

# =========================================================
# Status bar — base bg = @tn_bg_hl (#292e42); everything else is floating pills
# =========================================================
set -g status on
# Nothing in the bar shells out any more (see header note), so status-interval is
# now only "how often does the %H:%M clock repaint". The clock is minute-resolution,
# so a slow interval is fine and keeps repaints/CPU near zero. 15s is plenty.
set -g status-interval 5
set -g status-position top
set -g status-justify left
# Base bar = the tokyonight highlight bg (@tn_bg_hl = #292e42). Pills float on
# it. Literal hex, NOT #{@tn_bg_hl} — see the NOTE above (a #{...} ref here
# silently falls back to bright green).
set -g status-style "bg=#292e42,fg=#c0caf5"

# ── LEFT: session pill. Colour + glyph track state: ──────────────────────────
#      normal → blue · prefix active → orange · copy/search mode → yellow
set -g status-left-length 60
set -g status-left "#[fg=#{@tn_bg},bg=#{@tn_bg_hl}] #{@cap_l}#[fg=#{?client_prefix,#{@tn_orange},#{?pane_in_mode,#{@tn_yellow},#{@tn_blue}}},bg=#{@tn_bg}]#{?client_prefix,󰠠 ,#{?pane_in_mode,󰆏 ,}}#S#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_r} "

# ── WINDOWS: inactive = muted pill · current = blue pill (+ zoom glyph) ───────
set -g window-status-separator "#[bg=#292e42]"
set -g window-status-format "#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_l}#[fg=#{@tn_comment},bg=#{@tn_bg}]#I: #W#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_r} "
set -g window-status-current-format "#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_l}#[fg=#{@tn_blue},bg=#{@tn_bg}]#I: #W#{?window_zoomed_flag, 󰊓,}#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_r} "

# ── RIGHT: operator/VPN pill · cwd basename · clock ──────────────────────────
# The three #() pwsh pills (operator-IP / netspeed / CPU) that used to live here
# were the blank-cursor culprit (see the header note): psmux expands status-right
# synchronously while building each client's state push, so a cold `pwsh` spawn
# stalled the first paint. cwd + clock are pure in-process #{...} format vars.
#
# The leading segment is the operator/VPN pill — but it does NOT spawn pwsh. It
# reads a file with `type`, a ~10ms cmd builtin, run via an EXPLICIT `cmd /c`. The
# explicit `cmd /c` matters: psmux expands #() through the default-shell (pwsh),
# where `type` is an alias for Get-Content and `%LOCALAPPDATA%` is NOT expanded —
# so a bare `#(type %LOCALAPPDATA%\...)` reads a literal "%LOCALAPPDATA%" path and
# renders nothing. Under `cmd /c`, %VAR% expands and `type` is the builtin, as the
# design intended. `2>NUL` swallows the "file not found" when the pill cache does
# not exist (pill not enabled) so the segment renders nothing — the bar is just
# cwd + clock until you opt in. psmux caches the result for status-interval.
set -g status-right-length 150
set -g status-right "#(cmd /c type %LOCALAPPDATA%\dotfiles\psmux-netinfo.pill 2>NUL) #[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_l}#[fg=#{@tn_red},bg=#{@tn_bg}]󰉋 #{b:pane_current_path}#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_r} #[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_l}#[fg=#{@tn_magenta},bg=#{@tn_bg}]󰥔 %H:%M#[fg=#{@tn_bg},bg=#{@tn_bg_hl}]#{@cap_r} "

# ── OPT-IN: the operator/VPN pill (wired above, dormant until you enable it) ──
# The #(type ...) segment is already in status-right, but it renders nothing until
# a refresher keeps the cache file fresh. Turn it on from pwsh (no elevation):
# psmux-pill-enable               # per-session timer, TUNNEL-ONLY (quiet)
# psmux-pill-enable -AllNetworks  # also show the plain-LAN IP when off-VPN
# psmux-pill-status               # refresher state + current cached pill
# psmux-pill-disable              # stop it and blank the segment
# (helpers live in powershell/os/33-psmux-pill.ps1; the writer is
# psmux/scripts/psmux-netinfo.ps1.) Default is tunnel-only, so normally the bar is
# just cwd + clock and the orange VPN pill appears ONLY when a tunnel is up — the
# one thing worth a standout colour. The netspeed/CPU scripts are intentionally
# NOT revived: a per-interval flicker of rate and load is exactly the "noise" this
# redesign removes; btop covers that on demand.

# message / command-prompt styling (literal hex — style options, see NOTE above)
set -g message-style "fg=#c0caf5,bg=#24283b,bold"
set -g mode-style    "fg=#c0caf5,bg=#24283b"

# =========================================================
# Plugins
# =========================================================

set -g @plugin 'psmux-plugins/ppm'

# tokyo-night-tmux removed — the bar above is hand-rolled.

# ── resurrect + continuum: intentionally NOT loaded ───────────────────────────
# These were the source of the recurring "saved environment" banner and the
# slow attach (continuum restores + replays captured pane contents on every
# launch). Note: setting @continuum-restore 'off' does NOT stop the autosave —
# once the @plugin is declared, continuum installs a status-bar autosave hook
# that keeps firing regardless. The only reliable way to silence it is to not
# load the plugins at all, so the @plugin lines are removed here.
#
# To re-enable session persistence later, add these back:
#   set -g @plugin 'psmux-plugins/psmux-resurrect'
#   set -g @plugin 'psmux-plugins/psmux-continuum'
#   set -g @resurrect-capture-pane-contents 'off'   # keep 'off' for fast attach
#   set -g @continuum-restore 'on'
#   set -g @continuum-save-interval '60'            # minutes; 0 disables autosave
#   set -g @continuum-verbose 'off'
# then press prefix + I to fetch them. Manual save/restore is always available
# via prefix + Ctrl-s / prefix + Ctrl-r once resurrect is installed.

# =========================================================
# Pop-ups  (scripts live in psmux\scripts\*.ps1 → ~/.config/psmux/scripts)
# =========================================================
bind g popup -E -w 85% -h 85% -d "#{pane_current_path}" lazygit
bind w display-popup -E -w 40% -h 50% "pwsh -NoProfile -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-menu.ps1"
bind T display-popup -E -w 80% -h 80% "pwsh -NoProfile -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-scratch.ps1"
bind f display-popup -E -w 55% -h 65% "pwsh -NoProfile -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-sesh.ps1"
bind D display-popup -w 78% -h 80% "pwsh -NoProfile -NoExit -ExecutionPolicy Bypass -File ~/.config/psmux/scripts/psmux-cheat.ps1"

# =========================================================
# PPM bootstrap (auto-clone PPM on first run)
# =========================================================
# ppm is bootstrapped by install.ps1 into ~/.psmux/plugins/ppm (psmux's documented
# plugin path). ppm installs the declared @plugins there, and resurrect/continuum
# write their saves under ~/.psmux/ — the same tree psmux uses for its own runtime
# (session port/key files, warm session). After a fresh install, press prefix + I
# once to fetch the declared @plugins.
run '~/.psmux/plugins/ppm/ppm.ps1'
