<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Base styles for cross-platform consistency (CSS reset). Bundled locally
         so the widget is self-contained under the symlinked vanilla-clear/ dir. -->
    <link rel="stylesheet" type="text/css" href="./normalize.css" />

    <!-- Custom styles (Tokyo Night Storm). -->
    <link rel="stylesheet" type="text/css" href="./styles.css" />

    <!-- Empty favicon to suppress not-found errors. -->
    <link rel="icon" href="data:;" />

    <!-- Allows React to run buildless via the "text/babel" script below. -->
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from "https://esm.sh/react@18";
      import { createRoot } from "https://esm.sh/react-dom@18/client";
      // Client pinned to the same major as the Zebar app (3.x, packages.lock.json)
      // so the media provider + shellExec used below are present and the provider
      // output shapes match.
      import * as zebar from "https://esm.sh/zebar@3";

      const providers = zebar.createProviderGroup({
        // GlazeWM: workspaces + binding modes, so the bar pairs with the WM.
        glazewm: { type: "glazewm" },
        // Now-playing session for the media widget (title/artist + transport).
        media: { type: "media" },
        network: { type: "network" },
        cpu: { type: "cpu" },
        date: { type: "date", formatting: "EEE d MMM t" },
        battery: { type: "battery" },
        memory: { type: "memory" },
        weather: { type: "weather" },
      });

      createRoot(document.getElementById("root")).render(<App />);

      // --- Pomodoro (ported from the YASB config) -----------------------------
      // Self-contained 25/5 work-break timer. Click the time to start/pause;
      // right-click to reset. No Zebar provider — pure client-side state.
      const POMODORO_WORK = 25 * 60;
      const POMODORO_BREAK = 5 * 60;

      function Pomodoro() {
        const [mode, setMode] = useState("work"); // 'work' | 'break'
        const [remaining, setRemaining] = useState(POMODORO_WORK);
        const [running, setRunning] = useState(false);

        // Tick down once per second while running.
        useEffect(() => {
          if (!running) return undefined;
          const id = setInterval(
            () => setRemaining((r) => (r > 0 ? r - 1 : 0)),
            1000,
          );
          return () => clearInterval(id);
        }, [running]);

        // When a session hits zero, flip work<->break and load its duration.
        useEffect(() => {
          if (remaining !== 0 || !running) return;
          const next = mode === "work" ? "break" : "work";
          setMode(next);
          setRemaining(next === "work" ? POMODORO_WORK : POMODORO_BREAK);
        }, [remaining, running, mode]);

        function reset() {
          setRunning(false);
          setMode("work");
          setRemaining(POMODORO_WORK);
        }

        const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
        const ss = String(remaining % 60).padStart(2, "0");
        const state = running ? mode : "paused";

        return (
          <div
            className="pomodoro"
            title="click: start/pause · right-click: reset"
          >
            <i className={`nf nf-md-timer_outline ${state}`}></i>
            <span
              className={`label ${state}`}
              onClick={() => setRunning((v) => !v)}
              onContextMenu={(e) => {
                e.preventDefault();
                reset();
              }}
            >
              {mm}:{ss}
            </span>
          </div>
        );
      }

      // --- Media (ported from the YASB config) --------------------------------
      // Now-playing title/artist + prev/play-pause/next, driven by the Zebar
      // media provider. Controls live on the provider output, not the session.
      function Media({ media }) {
        const session = media?.currentSession;
        if (!session || (!session.title && !session.artist)) return null;
        const label = [session.title, session.artist].filter(Boolean).join(" — ");
        return (
          <div className="media">
            <button
              className="media-btn"
              disabled={!session.isPreviousEnabled}
              onClick={() => media.previous()}
              title="previous"
            >
              <i className="nf nf-md-skip_previous"></i>
            </button>
            <button
              className="media-btn"
              onClick={() => media.togglePlayPause()}
              title="play / pause"
            >
              <i
                className={`nf ${session.isPlaying ? "nf-md-pause" : "nf-md-play"}`}
              ></i>
            </button>
            <button
              className="media-btn"
              disabled={!session.isNextEnabled}
              onClick={() => media.next()}
              title="next"
            >
              <i className="nf nf-md-skip_next"></i>
            </button>
            <span className="media-label" title={label}>
              {label}
            </span>
          </div>
        );
      }

      // --- Power menu (ported from the YASB config) ---------------------------
      // A power icon that expands to lock/sleep/restart/shutdown. Each action runs
      // a shell command via Zebar's shellExec — the `shutdown`/`rundll32` programs
      // are whitelisted in zpack.json's `privileges.shellCommands`.
      const POWER_ACTIONS = [
        {
          key: "lock",
          icon: "nf-md-lock",
          title: "Lock",
          run: () => zebar.shellExec("rundll32", ["user32.dll,LockWorkStation"]),
        },
        {
          key: "sleep",
          icon: "nf-md-power_sleep",
          title: "Sleep",
          run: () =>
            zebar.shellExec("rundll32", [
              "powrprof.dll,SetSuspendState",
              "0,1,0",
            ]),
        },
        {
          key: "restart",
          icon: "nf-md-restart",
          title: "Restart",
          run: () => zebar.shellExec("shutdown", ["/r", "/t", "0"]),
        },
        {
          key: "shutdown",
          icon: "nf-md-power",
          title: "Shut down",
          run: () => zebar.shellExec("shutdown", ["/s", "/t", "0"]),
        },
      ];

      function PowerMenu() {
        const [open, setOpen] = useState(false);
        return (
          <div className={`power ${open ? "open" : ""}`}>
            {open &&
              POWER_ACTIONS.map((a) => (
                <button
                  key={a.key}
                  className={`power-action ${a.key}`}
                  title={a.title}
                  onClick={() => {
                    // Fire-and-forget; swallow rejections so a failed command
                    // can't surface an unhandled promise rejection in the widget.
                    Promise.resolve(a.run()).catch(() => {});
                    setOpen(false);
                  }}
                >
                  <i className={`nf ${a.icon}`}></i>
                </button>
              ))}
            <button
              className="power-toggle"
              title="power"
              onClick={() => setOpen((v) => !v)}
            >
              <i className="nf nf-md-power"></i>
            </button>
          </div>
        );
      }

      function App() {
        const [output, setOutput] = useState({ ...providers.outputMap });

        useEffect(() => {
          // Clone the map so React sees a new reference each tick (Zebar mutates
          // outputMap in place); return the unsubscribe so it's torn down on unmount.
          const unlisten = providers.onOutput(() =>
            setOutput({ ...providers.outputMap }),
          );
          return () => unlisten?.();
        }, []);

        // Get icon to show for current network status.
        function getNetworkIcon(networkOutput) {
          switch (networkOutput.defaultInterface?.type) {
            case "ethernet":
              return <i className="nf nf-md-ethernet_cable"></i>;
            case "wifi":
              if (networkOutput.defaultGateway?.signalStrength >= 80) {
                return <i className="nf nf-md-wifi_strength_4"></i>;
              } else if (networkOutput.defaultGateway?.signalStrength >= 65) {
                return <i className="nf nf-md-wifi_strength_3"></i>;
              } else if (networkOutput.defaultGateway?.signalStrength >= 40) {
                return <i className="nf nf-md-wifi_strength_2"></i>;
              } else if (networkOutput.defaultGateway?.signalStrength >= 25) {
                return <i className="nf nf-md-wifi_strength_1"></i>;
              } else {
                return <i className="nf nf-md-wifi_strength_outline"></i>;
              }
            default:
              return <i className="nf nf-md-wifi_strength_off_outline"></i>;
          }
        }

        // Get icon to show for how much of the battery is charged.
        function getBatteryIcon(batteryOutput) {
          if (batteryOutput.chargePercent > 90)
            return <i className="nf nf-fa-battery_4"></i>;
          if (batteryOutput.chargePercent > 70)
            return <i className="nf nf-fa-battery_3"></i>;
          if (batteryOutput.chargePercent > 40)
            return <i className="nf nf-fa-battery_2"></i>;
          if (batteryOutput.chargePercent > 20)
            return <i className="nf nf-fa-battery_1"></i>;
          return <i className="nf nf-fa-battery_0"></i>;
        }

        // Get icon to show for current weather status.
        function getWeatherIcon(weatherOutput) {
          switch (weatherOutput.status) {
            case "clear_day":
              return <i className="nf nf-weather-day_sunny"></i>;
            case "clear_night":
              return <i className="nf nf-weather-night_clear"></i>;
            case "cloudy_day":
              return <i className="nf nf-weather-day_cloudy"></i>;
            case "cloudy_night":
              return <i className="nf nf-weather-night_alt_cloudy"></i>;
            case "light_rain_day":
              return <i className="nf nf-weather-day_sprinkle"></i>;
            case "light_rain_night":
              return <i className="nf nf-weather-night_alt_sprinkle"></i>;
            case "heavy_rain_day":
              return <i className="nf nf-weather-day_rain"></i>;
            case "heavy_rain_night":
              return <i className="nf nf-weather-night_alt_rain"></i>;
            case "snow_day":
              return <i className="nf nf-weather-day_snow"></i>;
            case "snow_night":
              return <i className="nf nf-weather-night_alt_snow"></i>;
            case "thunder_day":
              return <i className="nf nf-weather-day_lightning"></i>;
            case "thunder_night":
              return <i className="nf nf-weather-night_alt_lightning"></i>;
          }
        }

        return (
          <div className="app">
            <div className="left">
              {/* GlazeWM workspaces — click to focus, mirrors alt+<n>. */}
              {output.glazewm && (
                <div className="workspaces">
                  {output.glazewm.currentWorkspaces.map((workspace) => (
                    <button
                      className={`workspace${
                        workspace.hasFocus ? " focused" : ""
                      }${workspace.isDisplayed ? " displayed" : ""}`}
                      onClick={() =>
                        output.glazewm.runCommand(
                          `focus --workspace ${workspace.name}`,
                        )
                      }
                      key={workspace.name}
                    >
                      {workspace.displayName ?? workspace.name}
                    </button>
                  ))}
                </div>
              )}

              {/* Active binding mode (e.g. "resize"), if any. */}
              {output.glazewm?.bindingModes.map((bindingMode) => (
                <button
                  className="binding-mode"
                  key={bindingMode.name}
                  onClick={() =>
                    output.glazewm.runCommand(
                      `wm-disable-binding-mode --name ${bindingMode.name}`,
                    )
                  }
                >
                  {bindingMode.displayName ?? bindingMode.name}
                </button>
              ))}

              <Pomodoro />
            </div>

            <div className="center">{output.date?.formatted}</div>

            <div className="right">
              <Media media={output.media} />

              {output.network && (
                <div className="network">
                  {getNetworkIcon(output.network)}
                  {output.network.defaultGateway?.ssid}
                </div>
              )}

              {output.memory && (
                <div className="memory">
                  <i className="nf nf-fae-chip"></i>
                  {Math.round(output.memory.usage)}%
                </div>
              )}

              {output.cpu && (
                <div className="cpu">
                  <i className="nf nf-oct-cpu"></i>

                  {/* Change the text color if the CPU usage is high. */}
                  <span className={output.cpu.usage > 85 ? "high-usage" : ""}>
                    {Math.round(output.cpu.usage)}%
                  </span>
                </div>
              )}

              {output.battery && (
                <div className="battery">
                  {/* Show icon for whether battery is charging. */}
                  {output.battery.isCharging && (
                    <i className="nf nf-md-power_plug charging-icon"></i>
                  )}
                  {getBatteryIcon(output.battery)}
                  {Math.round(output.battery.chargePercent)}%
                </div>
              )}

              {output.weather && (
                <div className="weather">
                  {getWeatherIcon(output.weather)}
                  {Math.round(output.weather.celsiusTemp)}°C
                </div>
              )}

              <PowerMenu />
            </div>
          </div>
        );
      }
    </script>
  </body>
</html>
