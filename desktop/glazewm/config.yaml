# ============================================================================
#  GlazeWM — tiling window manager for the Windows host (opt-in desktop layer)
#
#  Symlinked to ~/.glzr/glazewm/config.yaml by install.ps1 (Get-DotfilesLinkPlan).
#
#  SHARED KEYMAP: this file is kept keystroke-for-keystroke identical to the Mac's
#  AeroSpace config (dotfiles-MacBook/aerospace/aerospace.toml). Every binding below
#  has an exact twin there; the two window managers are a single muscle-memory across
#  Windows and macOS. Only bindings both WMs can express identically are kept —
#  WM-specific extras (minimize, toggle-tiling, pause mode, wm-redraw, wm-exit, and
#  directional monitor-move) were dropped for strict parity.
#  Change one side → change the other.
#
#  Retuned for this fleet:
#    • borders + accents follow Tokyo Night Storm (matches starship/nvim/WT)
#    • the alt+<arrow> focus/move binds are REMOVED so they don't shadow Windows
#      Terminal's own alt+<arrow> pane-focus (see windows-terminal/settings.json);
#      window navigation is vim-style alt+h/j/k/l instead.
#    • alt+enter launches Windows Terminal (`wt`), the host's daily-driver terminal
#
#  GlazeWM is installed from winget (glzr-io.glazewm) as part of the optional
#  `desktop` package group. Reload after edits with alt+shift+r.
# ============================================================================
general:
  # Launch Zebar (the top bar) when the WM starts. Configure which widget shows
  # in Zebar itself; this repo ships desktop/zebar/vanilla-clear.
  startup_commands: ["shell-exec zebar"]
  # Don't steal focus just because the cursor passed over a window.
  focus_follows_cursor: false
  # Re-focusing the current workspace does nothing (no back-and-forth toggle).
  toggle_workspace_on_refocus: false
  cursor_jump:
    # Warp the cursor to the newly-focused window so it's always where you look.
    enabled: true
    trigger: "window_focus"

gaps:
  # Gap between adjacent windows.
  inner_gap: "10px"
  # Gap between windows and the screen edge. The 50px top leaves room for Zebar.
  outer_gap:
    top: "50px"
    right: "10px"
    bottom: "10px"
    left: "10px"

window_effects:
  # Tokyo Night Storm: blue accent on the focused window, muted comment-grey on
  # the rest. Borders are a Windows 11-only API.
  focused_window:
    border:
      enabled: true
      color: "#7aa2f7"
  other_windows:
    border:
      enabled: true
      color: "#565f89"

window_behavior:
  # New windows tile by default.
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false

# Five workspaces, matching AeroSpace's persistent 1–5.
workspaces:
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"

window_rules:
  - commands: ["ignore"]
    match:
      # Never tile the Zebar bar itself.
      - window_process: {equals: "zebar"}
      # Leave browser picture-in-picture windows floating.
      - window_title: {regex: "[Pp]icture.in.[Pp]icture"}
        window_class: {regex: "Chrome_WidgetWin_1|MozillaDialogClass"}
      # PowerToys' PowerAccent (accent-character popup) shouldn't be managed.
      - window_process: {equals: "PowerToys.PowerAccent"}

binding_modes:
  # Resize the focused window with HJKL, then escape/enter to exit. Identical to
  # AeroSpace's resize mode: h/l size width, k/j size height.
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h"]
      - commands: ["resize --width +2%"]
        bindings: ["l"]
      - commands: ["resize --height +2%"]
        bindings: ["k"]
      - commands: ["resize --height -2%"]
        bindings: ["j"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

keybindings:
  # --- focus (vim keys only — alt+<arrow> is left to Windows Terminal) ---------
  - commands: ["focus --direction left"]
    bindings: ["alt+h"]
  - commands: ["focus --direction right"]
    bindings: ["alt+l"]
  - commands: ["focus --direction up"]
    bindings: ["alt+k"]
  - commands: ["focus --direction down"]
    bindings: ["alt+j"]

  # --- move the focused window (vim keys only, same reason) --------------------
  - commands: ["move --direction left"]
    bindings: ["alt+shift+h"]
  - commands: ["move --direction right"]
    bindings: ["alt+shift+l"]
  - commands: ["move --direction up"]
    bindings: ["alt+shift+k"]
  - commands: ["move --direction down"]
    bindings: ["alt+shift+j"]

  # --- resize (quick nudges; alt+r enters the dedicated resize mode) -----------
  # u/p = width -/+, o/i = height +/- (mirrors AeroSpace).
  - commands: ["resize --width -2%"]
    bindings: ["alt+u"]
  - commands: ["resize --width +2%"]
    bindings: ["alt+p"]
  - commands: ["resize --height +2%"]
    bindings: ["alt+o"]
  - commands: ["resize --height -2%"]
    bindings: ["alt+i"]
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["alt+r"]

  # --- layout ------------------------------------------------------------------
  - commands: ["toggle-tiling-direction"]
    bindings: ["alt+v"]
  - commands: ["toggle-floating --centered"]
    bindings: ["alt+shift+space"]
  - commands: ["toggle-fullscreen"]
    bindings: ["alt+f"]
  - commands: ["close"]
    bindings: ["alt+shift+q"]

  # --- WM control --------------------------------------------------------------
  - commands: ["wm-reload-config"]
    bindings: ["alt+shift+r"]

  # --- launch Windows Terminal (the host's daily-driver terminal) --------------
  - commands: ["shell-exec wt"]
    bindings: ["alt+enter"]

  # --- workspaces (a = prev, s = next, d = recent; mirrors AeroSpace) ----------
  - commands: ["focus --next-workspace"]
    bindings: ["alt+s"]
  - commands: ["focus --prev-workspace"]
    bindings: ["alt+a"]
  - commands: ["focus --recent-workspace"]
    bindings: ["alt+d"]
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]

  # --- send the focused window to a workspace and follow it ---------------------
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["alt+shift+5"]
